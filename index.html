<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>黑白画 · 极简</title>
    <style>
        /* ----- 全局重置 & 基础 ----- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --app-bg: rgba(255, 255, 255, 0.88);
            --card-bg: rgba(248, 248, 248, 0.7);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-placeholder: #b0b0b0;
            --shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 8px 32px rgba(0, 0, 0, 0.2);
            --transition-duration: 0.5s;
            --star-count: 200;
            --max-export-size: 2048;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
            overflow-x: hidden;
            color: var(--text-primary);
            touch-action: manipulation;
        }

        /* ----- 背景层 ----- */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: background 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: #0a0a0f;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 1;
        }

        /* ----- 主容器 ----- */
        .app {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            background: var(--app-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 20px 18px 18px;
            animation: appEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: background 0.6s ease, border-color 0.6s ease;
        }

        @supports not (backdrop-filter: blur(12px)) {
            .app {
                background: rgba(255, 255, 255, 0.96);
                border: 1px solid rgba(0, 0, 0, 0.1);
            }
        }

        @keyframes appEnter {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ----- 左上角设置按钮 ----- */
        .settings-toggle {
            position: absolute;
            top: 12px;
            left: 14px;
            z-index: 10;
            background: rgba(26, 26, 26, 0.06);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 6px 14px 6px 12px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            user-select: none;
            min-height: 36px;
        }

        .settings-toggle:hover {
            background: rgba(26, 26, 26, 0.12);
            border-color: rgba(0, 0, 0, 0.2);
            transform: scale(1.03);
        }

        .settings-toggle:active {
            transform: scale(0.94);
        }

        .settings-toggle .gear {
            display: inline-block;
            font-size: 16px;
            line-height: 1;
            transform: rotate(0deg);
            transition: transform 0.5s ease;
        }

        .settings-toggle:hover .gear {
            transform: rotate(60deg);
        }

        /* ----- 设置面板 ----- */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            z-index: 1001;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 28px 24px 24px;
            min-width: 280px;
            max-width: 400px;
            width: 92%;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .settings-overlay.open .settings-panel {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .settings-panel .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 20px;
            color: #888;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s ease, color 0.2s ease;
            line-height: 1;
            min-width: 36px;
            min-height: 36px;
        }

        .settings-panel .close-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #1a1a1a;
        }

        .settings-panel h2 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--text-primary);
            margin: 0 0 16px 0;
            padding-right: 30px;
            border-bottom: 1px solid #ececec;
            padding-bottom: 12px;
        }

        .settings-section {
            margin-bottom: 16px;
        }

        .settings-section .section-title {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .bg-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bg-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 14px;
            color: #333;
            user-select: none;
            position: relative;
            min-height: 44px;
        }

        .bg-option:hover {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.06);
        }

        .bg-option.active {
            background: rgba(26, 26, 26, 0.06);
            border-color: #1a1a1a;
        }

        .bg-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .bg-option .check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
            font-size: 11px;
            color: transparent;
        }

        .bg-option.active .check {
            border-color: #1a1a1a;
            background: #1a1a1a;
            color: #fff;
        }

        .bg-option .check::after {
            content: "✓";
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .bg-option.active .check::after {
            opacity: 1;
        }

        .bg-option .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .bg-option .label {
            flex: 1;
        }

        .bg-option .hint {
            font-size: 11px;
            color: #aaa;
            font-weight: 300;
        }

        .bg-option.disabled {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
        }

        #bgFileInput {
            display: none;
        }

        .bg-option.custom-trigger {
            cursor: pointer;
        }

        /* ----- 头部 ----- */
        .header {
            text-align: center;
            margin-bottom: 18px;
            padding-top: 4px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            text-transform: uppercase;
        }

        .header .line {
            width: 30px;
            height: 1px;
            background: #c8c8c8;
            margin: 8px auto 0;
        }

        /* ----- 工具栏 ----- */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            background: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            min-width: 80px;
            min-height: 44px;
            touch-action: manipulation;
        }

        .btn:hover {
            border-color: #1a1a1a;
            background: #1a1a1a;
            color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #1a1a1a;
            color: #ffffff;
            border-color: #1a1a1a;
        }

        .btn-primary:hover {
            background: #333;
            border-color: #333;
            color: #fff;
        }

        .btn-primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-save {
            background: #1a1a1a;
            color: #ffffff;
            border-color: #1a1a1a;
        }

        .btn-save:hover {
            background: #333;
            border-color: #333;
            color: #fff;
        }

        .btn-save:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-save.saved::after {
            content: " ✓";
        }

        #fileInput {
            display: none;
        }

        /* ----- 画廊 ----- */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        @supports not (backdrop-filter: blur(4px)) {
            .card {
                background: rgba(248, 248, 248, 0.9);
            }
        }

        .card.drag-over {
            border-color: #1a1a1a;
            background: rgba(243, 243, 243, 0.8);
            box-shadow: 0 0 0 2px #1a1a1a inset;
        }

        .card-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            padding: 10px 16px 4px;
            background: transparent;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            text-align: center;
            font-weight: 400;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
            min-height: 120px;
        }

        .card-content img,
        .card-content canvas {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 6px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .card-content .placeholder {
            color: var(--text-placeholder);
            font-size: 13px;
            letter-spacing: 0.5px;
            font-weight: 300;
            text-align: center;
            padding: 16px;
            line-height: 1.6;
        }

        .card-content .placeholder .symbol {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
            opacity: 0.3;
            font-weight: 200;
        }

        .placeholder-pulse {
            animation: pulseText 3s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        #originalCard {
            cursor: pointer;
        }

        /* ----- 加载指示器 ----- */
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #1a1a1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ----- Toast ----- */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(26, 26, 26, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            letter-spacing: 0.5px;
            font-weight: 300;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            z-index: 2000;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ----- 导出选项 (增强) ----- */
        .export-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }

        .export-row .export-options {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .export-options select,
        .export-options input[type="text"] {
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #d0d0d0;
            background: #fff;
            font-size: 13px;
            color: #1a1a1a;
            min-height: 36px;
            outline: none;
            transition: border 0.2s ease;
        }

        .export-options select:focus,
        .export-options input[type="text"]:focus {
            border-color: #1a1a1a;
        }

        .export-options input[type="text"] {
            min-width: 80px;
            width: 100px;
        }

        /* ----- 响应式 (移动优先) ----- */
        @media (max-width: 600px) {
            .app {
                padding: 14px 10px 12px;
                border-radius: 20px;
            }
            .header h1 {
                font-size: 20px;
                letter-spacing: 6px;
            }
            .gallery {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .card {
                min-height: 160px;
            }
            .card-content {
                min-height: 100px;
                padding: 8px;
            }
            .btn {
                padding: 8px 14px;
                font-size: 13px;
                min-width: 60px;
                min-height: 40px;
            }
            .toolbar {
                gap: 8px;
            }
            .settings-toggle {
                top: 8px;
                left: 10px;
                padding: 4px 10px 4px 8px;
                font-size: 12px;
                min-height: 32px;
            }
            .settings-panel {
                padding: 20px 16px 16px;
                max-width: 96%;
                min-width: unset;
            }
            .export-options input[type="text"] {
                width: 70px;
                min-width: 60px;
            }
            .export-options select {
                min-width: 60px;
            }
        }

        @media (max-width: 400px) {
            .app {
                padding: 10px 6px 8px;
                border-radius: 16px;
            }
            .header h1 {
                font-size: 18px;
                letter-spacing: 4px;
            }
            .card {
                min-height: 120px;
            }
            .card-content {
                min-height: 80px;
                padding: 6px;
            }
            .btn {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 50px;
                min-height: 36px;
            }
            .export-options input[type="text"] {
                width: 60px;
                min-width: 50px;
                font-size: 12px;
            }
            .export-options select {
                font-size: 12px;
                min-width: 50px;
            }
            .settings-toggle {
                font-size: 11px;
                padding: 3px 8px 3px 6px;
                min-height: 28px;
            }
            .settings-panel {
                padding: 16px 12px 12px;
            }
        }

        /* 减少动态效果适配 */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- 背景层 -->
    <div class="bg-layer" id="bgLayer"></div>
    <canvas id="starCanvas" aria-hidden="true"></canvas>

    <!-- 主应用 -->
    <div class="app" id="app" role="main">

        <!-- 左上角设置按钮 -->
        <button class="settings-toggle" id="settingsToggle" type="button" aria-controls="settingsOverlay" aria-expanded="false">
            <span class="gear" aria-hidden="true">⚙</span> 设置
        </button>

        <!-- 头部 -->
        <header class="header">
            <h1>黑白画</h1>
            <div class="line"></div>
        </header>

        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="btn btn-primary" id="importBtn" type="button">导入图片</button>
            <input type="file" id="fileInput" accept="image/*" aria-label="选择图片文件" />
            <span id="loadingIndicator" style="display:none; font-size:13px; color:#666;">
                <span class="loader"></span> 处理中...
            </span>
        </div>

        <!-- 画廊 -->
        <div class="gallery" id="gallery">
            <div class="card" id="originalCard" role="button" tabindex="0" aria-label="点击或拖拽导入图片">
                <div class="card-label">原图</div>
                <div class="card-content" id="originalContent">
                    <div class="placeholder placeholder-pulse">
                        <span class="symbol" aria-hidden="true">⌘</span>
                        点击或拖拽
                    </div>
                </div>
            </div>
            <div class="card" id="resultCard">
                <div class="card-label">黑白效果</div>
                <div class="card-content" id="resultContent">
                    <div class="placeholder placeholder-pulse">
                        等待图片
                    </div>
                </div>
            </div>
        </div>

        <!-- 导出区域 (含多种格式) -->
        <div class="export-row">
            <div class="export-options">
                <input type="text" id="fileNameInput" value="黑白画" aria-label="文件名" />
                <select id="formatSelect" aria-label="导出格式">
                    <option value="png">PNG</option>
                    <option value="jpeg">JPEG</option>
                    <option value="webp">WebP</option>
                    <option value="bmp">BMP</option>
                </select>
                <button class="btn btn-save" id="saveBtn" type="button" disabled>保存</button>
            </div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-panel">
            <button class="close-btn" id="settingsCloseBtn" type="button" aria-label="关闭设置">✕</button>
            <h2 id="settingsTitle">设置</h2>
            <div class="settings-section">
                <div class="section-title">画面</div>
                <div class="bg-options" id="bgOptions" role="radiogroup" aria-label="背景选择">
                    <label class="bg-option active" data-bg="star" role="radio" aria-checked="true" tabindex="0">
                        <input type="radio" name="bg" value="star" checked />
                        <span class="check" aria-hidden="true"></span>
                        <span class="label">星空背景</span>
                        <span class="hint">默认</span>
                    </label>
                    <label class="bg-option" data-bg="black" role="radio" aria-checked="false" tabindex="0">
                        <input type="radio" name="bg" value="black" />
                        <span class="check" aria-hidden="true"></span>
                        <span class="color-swatch" style="background:#0a0a0f;" aria-hidden="true"></span>
                        <span class="label">纯黑背景</span>
                    </label>
                    <label class="bg-option" data-bg="white" role="radio" aria-checked="false" tabindex="0">
                        <input type="radio" name="bg" value="white" />
                        <span class="check" aria-hidden="true"></span>
                        <span class="color-swatch" style="background:#f0f0f0;" aria-hidden="true"></span>
                        <span class="label">纯白背景</span>
                    </label>
                    <label class="bg-option" data-bg="eye" role="radio" aria-checked="false" tabindex="0">
                        <input type="radio" name="bg" value="eye" />
                        <span class="check" aria-hidden="true"></span>
                        <span class="color-swatch" style="background:#d4e9d6;" aria-hidden="true"></span>
                        <span class="label">护眼色背景</span>
                    </label>
                    <label class="bg-option custom-trigger" data-bg="custom" role="radio" aria-checked="false" tabindex="0">
                        <input type="radio" name="bg" value="custom" />
                        <span class="check" aria-hidden="true"></span>
                        <span class="label">自选图片背景</span>
                        <span class="hint">+ 上传</span>
                    </label>
                </div>
            </div>
            <input type="file" id="bgFileInput" accept="image/*" aria-label="上传自定义背景图片" />
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <script>
        (function() {
            'use strict';

            // ----- 常量 -----
            const MAX_EXPORT_SIZE = 2048;
            const STAR_COUNT = 200;
            const TOAST_DURATION = 2000;

            // ----- DOM 引用 -----
            const bgLayer = document.getElementById('bgLayer');
            const starCanvas = document.getElementById('starCanvas');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsCloseBtn = document.getElementById('settingsCloseBtn');
            const bgOptions = document.getElementById('bgOptions');
            const bgFileInput = document.getElementById('bgFileInput');
            const fileInput = document.getElementById('fileInput');
            const importBtn = document.getElementById('importBtn');
            const originalContent = document.getElementById('originalContent');
            const resultContent = document.getElementById('resultContent');
            const saveBtn = document.getElementById('saveBtn');
            const fileNameInput = document.getElementById('fileNameInput');
            const formatSelect = document.getElementById('formatSelect');
            const toast = document.getElementById('toast');
            const gallery = document.getElementById('gallery');
            const originalCard = document.getElementById('originalCard');
            const loadingIndicator = document.getElementById('loadingIndicator');

            // ----- 状态 -----
            let imageData = null; // 原始图像数据 (缩放后)
            let displayCanvas = null; // 预览画布
            let offscreenCanvas = null;
            let offscreenCtx = null;
            let isProcessing = false;
            let toastTimer = null;
            let isTransitioning = false;
            let currentBg = 'star';
            let starCtx = null;
            let starWidth = 0;
            let starHeight = 0;
            let stars = [];
            let starAnimId = null;
            let bgCustomImageData = null;
            let dragCounter = 0;
            let imageLoaded = false;

            // 固定参数 (灰度)
            const FIXED_BRIGHTNESS = 0;
            const FIXED_CONTRAST = 100;
            const FIXED_THRESHOLD = 0;

            // ----- Toast -----
            function showToast(text, duration) {
                duration = duration || TOAST_DURATION;
                toast.textContent = text;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(function() {
                    toast.classList.remove('show');
                }, duration);
            }

            // ----- 星空背景 -----
            function initStarCanvas() {
                starCanvas.width = window.innerWidth;
                starCanvas.height = window.innerHeight;
                starWidth = starCanvas.width;
                starHeight = starCanvas.height;
                starCtx = starCanvas.getContext('2d');
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * starWidth,
                        y: Math.random() * starHeight,
                        radius: 0.5 + Math.random() * 1.6,
                        speed: 0.3 + Math.random() * 0.7,
                        phase: Math.random() * Math.PI * 2,
                        alpha: 0.3 + Math.random() * 0.7,
                        color: `hsl(${220 + Math.random() * 30}, 30%, ${80 + Math.random() * 20}%)`
                    });
                }
            }

            function drawStars(time) {
                if (!starCtx) return;
                const ctx = starCtx;
                ctx.clearRect(0, 0, starWidth, starHeight);
                for (const star of stars) {
                    const flicker = 0.5 + 0.5 * Math.sin(time * star.speed + star.phase);
                    const alpha = star.alpha * (0.4 + 0.6 * flicker);
                    const r = star.radius * (0.8 + 0.4 * flicker);
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = star.color;
                    ctx.globalAlpha = Math.min(alpha, 1);
                    ctx.fill();
                    if (r > 1.0) {
                        ctx.shadowColor = 'rgba(255,255,255,0.12)';
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, r * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255,255,255,0.06)';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
                ctx.globalAlpha = 1;
            }

            function starAnimation(time) {
                drawStars(time / 1000);
                starAnimId = requestAnimationFrame(starAnimation);
            }

            function startStarAnimation() {
                if (starAnimId) return;
                starAnimation(0);
            }

            function stopStarAnimation() {
                if (starAnimId) {
                    cancelAnimationFrame(starAnimId);
                    starAnimId = null;
                }
                if (starCtx) {
                    starCtx.clearRect(0, 0, starWidth, starHeight);
                }
            }

            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    if (currentBg === 'star') stopStarAnimation();
                } else {
                    if (currentBg === 'star') {
                        initStarCanvas();
                        startStarAnimation();
                    }
                }
            });

            let resizeTimer = null;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (currentBg === 'star') {
                        initStarCanvas();
                        if (!starAnimId && !document.hidden) startStarAnimation();
                    }
                }, 300);
            });

            // ----- 背景管理 -----
            function applyBackground(type, customUrl) {
                if (isTransitioning) return;
                if (type === currentBg && type !== 'custom') return;
                if (type === 'custom' && type === currentBg && customUrl === bgCustomImageData) return;

                isTransitioning = true;
                document.querySelectorAll('.bg-option').forEach(el => el.classList.add('disabled'));

                const isStar = (type === 'star');
                if (isStar) {
                    starCanvas.style.opacity = '1';
                    bgLayer.style.background = '#0a0a0f';
                    initStarCanvas();
                    if (!document.hidden) startStarAnimation();
                } else {
                    starCanvas.style.opacity = '0';
                    if (starAnimId) {
                        cancelAnimationFrame(starAnimId);
                        starAnimId = null;
                    }
                    let bgValue = '';
                    switch (type) {
                        case 'black':
                            bgValue = '#0a0a0f';
                            break;
                        case 'white':
                            bgValue = '#f0f0f0';
                            break;
                        case 'eye':
                            bgValue = '#d4e9d6';
                            break;
                        case 'custom':
                            if (customUrl) {
                                bgValue = `url(${customUrl}) center/cover no-repeat`;
                            } else {
                                bgValue = '#1a1a1a';
                            }
                            break;
                        default:
                            bgValue = '#0a0a0f';
                    }
                    bgLayer.style.background = bgValue;
                }

                document.querySelectorAll('.bg-option').forEach(el => {
                    const radio = el.querySelector('input[type="radio"]');
                    if (radio) {
                        const isActive = (el.dataset.bg === type);
                        radio.checked = isActive;
                        el.classList.toggle('active', isActive);
                        el.setAttribute('aria-checked', isActive ? 'true' : 'false');
                    }
                });

                currentBg = type;
                if (type === 'custom') bgCustomImageData = customUrl || null;

                setTimeout(function() {
                    isTransitioning = false;
                    document.querySelectorAll('.bg-option').forEach(el => el.classList.remove('disabled'));
                }, 950);
            }

            // ----- 设置面板 -----
            function toggleSettings(open) {
                if (open === undefined) {
                    const isOpen = settingsOverlay.classList.contains('open');
                    open = !isOpen;
                }
                if (open) {
                    settingsOverlay.classList.add('open');
                    settingsToggle.setAttribute('aria-expanded', 'true');
                    document.body.style.overflow = 'hidden';
                    setTimeout(() => {
                        const focusable = settingsOverlay.querySelector('button, input, [tabindex="0"]');
                        if (focusable) focusable.focus();
                    }, 100);
                } else {
                    settingsOverlay.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                    document.body.style.overflow = '';
                    settingsToggle.focus();
                }
            }

            settingsToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSettings();
            });

            settingsCloseBtn.addEventListener('click', function() {
                toggleSettings(false);
            });

            settingsOverlay.addEventListener('click', function(e) {
                if (e.target === settingsOverlay) toggleSettings(false);
            });

            settingsOverlay.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') toggleSettings(false);
            });

            bgOptions.addEventListener('click', function(e) {
                const option = e.target.closest('.bg-option');
                if (!option) return;
                if (isTransitioning) return;
                if (option.classList.contains('disabled')) return;

                const type = option.dataset.bg;
                if (type === 'custom') {
                    bgFileInput.click();
                    return;
                }
                const radio = option.querySelector('input[type="radio"]');
                if (radio) radio.checked = true;
                applyBackground(type);
                setTimeout(() => toggleSettings(false), 300);
            });

            bgOptions.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    const option = e.target.closest('.bg-option');
                    if (option) {
                        e.preventDefault();
                        option.click();
                    }
                }
            });

            bgFileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    const file = this.files[0];
                    if (!file.type.startsWith('image/')) {
                        showToast('请选择图片文件', 1800);
                        this.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const dataUrl = ev.target.result;
                        applyBackground('custom', dataUrl);
                        document.querySelectorAll('.bg-option').forEach(el => {
                            const radio = el.querySelector('input[type="radio"]');
                            if (radio && el.dataset.bg === 'custom') {
                                radio.checked = true;
                                el.classList.add('active');
                                el.setAttribute('aria-checked', 'true');
                            } else if (radio) {
                                radio.checked = false;
                                el.classList.remove('active');
                                el.setAttribute('aria-checked', 'false');
                            }
                        });
                        toggleSettings(false);
                        showToast('背景已更换', 1500);
                    };
                    reader.onerror = function() {
                        showToast('读取失败', 1800);
                    };
                    reader.readAsDataURL(file);
                }
                this.value = '';
            });

            // ----- 图像处理 (固定参数) -----
            function processImageData(srcData) {
                const data = srcData.data;
                const len = data.length;
                const brightOffset = FIXED_BRIGHTNESS;
                const contrastFactor = FIXED_CONTRAST / 100;
                const thresh = FIXED_THRESHOLD;

                const map = new Uint8ClampedArray(256);
                for (let i = 0; i < 256; i++) {
                    let v = (i - 128) * contrastFactor + 128 + brightOffset;
                    v = Math.min(255, Math.max(0, Math.round(v)));
                    map[i] = v;
                }

                const newData = new ImageData(
                    new Uint8ClampedArray(data),
                    srcData.width,
                    srcData.height
                );
                const out = newData.data;
                for (let i = 0; i < len; i += 4) {
                    const r = out[i];
                    const g = out[i + 1];
                    const b = out[i + 2];
                    let luma = 0.299 * r + 0.587 * g + 0.114 * b;
                    luma = Math.min(255, Math.max(0, Math.round(luma)));
                    let val = map[luma];
                    if (thresh > 0) {
                        val = (val >= thresh) ? 255 : 0;
                    }
                    out[i] = val;
                    out[i + 1] = val;
                    out[i + 2] = val;
                }
                return newData;
            }

            // ----- 渲染预览 -----
            function renderPreview() {
                if (!imageData || !displayCanvas) return;
                const processed = processImageData(imageData);
                // 绘制到离屏画布
                offscreenCanvas.width = processed.width;
                offscreenCanvas.height = processed.height;
                offscreenCtx.putImageData(processed, 0, 0);

                // 绘制到显示画布 (缩放适配)
                const dpr = window.devicePixelRatio || 1;
                const rect = displayCanvas.parentElement.getBoundingClientRect();
                const maxW = rect.width - 16;
                const maxH = rect.height - 16;
                const w = processed.width;
                const h = processed.height;
                const scale = Math.min(1, maxW / w, maxH / h);
                const displayW = Math.round(w * scale);
                const displayH = Math.round(h * scale);

                displayCanvas.width = displayW * dpr;
                displayCanvas.height = displayH * dpr;
                displayCanvas.style.width = displayW + 'px';
                displayCanvas.style.height = displayH + 'px';
                const ctx = displayCanvas.getContext('2d');
                ctx.scale(dpr, dpr);
                ctx.clearRect(0, 0, displayW, displayH);
                ctx.drawImage(offscreenCanvas, 0, 0, displayW, displayH);
            }

            // ----- 初始化显示画布 -----
            function initDisplayCanvas() {
                const container = resultContent;
                container.innerHTML = '';
                displayCanvas = document.createElement('canvas');
                displayCanvas.style.display = 'block';
                displayCanvas.style.margin = 'auto';
                container.appendChild(displayCanvas);
                offscreenCanvas = document.createElement('canvas');
                offscreenCtx = offscreenCanvas.getContext('2d');
            }

            // ----- 加载源图片 -----
            function loadSourceImage(imgElement) {
                const origW = imgElement.naturalWidth || imgElement.width;
                const origH = imgElement.naturalHeight || imgElement.height;

                let w = origW,
                    h = origH;
                if (w > MAX_EXPORT_SIZE || h > MAX_EXPORT_SIZE) {
                    const scale = Math.min(MAX_EXPORT_SIZE / w, MAX_EXPORT_SIZE / h);
                    w = Math.round(w * scale);
                    h = Math.round(h * scale);
                    showToast(`已缩放至 ${w}x${h}`, 2000);
                }

                // 获取图像数据
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(imgElement, 0, 0, w, h);
                imageData = ctx.getImageData(0, 0, w, h);

                // 初始化显示画布
                if (!displayCanvas) {
                    initDisplayCanvas();
                }
                // 显示原图
                const displayImg = document.createElement('img');
                displayImg.src = imgElement.src;
                displayImg.alt = '原图';
                displayImg.style.maxWidth = '100%';
                displayImg.style.maxHeight = '100%';
                displayImg.style.objectFit = 'contain';
                displayImg.draggable = false;
                originalContent.innerHTML = '';
                originalContent.appendChild(displayImg);

                // 渲染预览
                renderPreview();
                imageLoaded = true;
                saveBtn.disabled = false;
                loadingIndicator.style.display = 'none';
                showToast('图片已加载', 1500);
            }

            // ----- 文件处理 -----
            function handleFile(file) {
                if (!file || !file.type.startsWith('image/')) {
                    showToast('请选择图片文件', 1800);
                    return;
                }
                const validExts = ['jpg', 'jpeg', 'png', 'webp', 'bmp', 'gif', 'svg', 'tiff'];
                const ext = file.name.split('.').pop().toLowerCase();
                if (!validExts.includes(ext)) {
                    showToast('不支持的文件格式', 1800);
                    return;
                }

                loadingIndicator.style.display = 'inline-block';
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        loadSourceImage(img);
                    };
                    img.onerror = function() {
                        loadingIndicator.style.display = 'none';
                        showToast('图片加载失败', 2000);
                    };
                    img.src = e.target.result;
                };
                reader.onerror = function() {
                    loadingIndicator.style.display = 'none';
                    showToast('读取失败', 1800);
                };
                reader.readAsDataURL(file);
            }

            // ----- 保存 (支持多格式) -----
            function saveImage() {
                if (!imageData) {
                    showToast('请先导入图片', 1800);
                    return;
                }
                const processed = processImageData(imageData);
                const canvas = document.createElement('canvas');
                canvas.width = processed.width;
                canvas.height = processed.height;
                const ctx = canvas.getContext('2d');
                ctx.putImageData(processed, 0, 0);

                try {
                    const format = formatSelect.value;
                    let mimeType = 'image/png';
                    let quality = undefined;
                    let ext = 'png';

                    switch (format) {
                        case 'png':
                            mimeType = 'image/png';
                            ext = 'png';
                            break;
                        case 'jpeg':
                            mimeType = 'image/jpeg';
                            quality = 0.92;
                            ext = 'jpg';
                            break;
                        case 'webp':
                            mimeType = 'image/webp';
                            quality = 0.92; // 有损WebP，也可设为无损，但默认有损
                            ext = 'webp';
                            break;
                        case 'bmp':
                            mimeType = 'image/bmp';
                            ext = 'bmp';
                            break;
                        default:
                            mimeType = 'image/png';
                            ext = 'png';
                    }

                    const dataUrl = canvas.toDataURL(mimeType, quality);
                    const link = document.createElement('a');
                    const baseName = fileNameInput.value.trim() || '黑白画';
                    link.download = `${baseName}.${ext}`;
                    link.href = dataUrl;
                    link.click();
                    saveBtn.classList.add('saved');
                    showToast(`已保存为 ${ext.toUpperCase()}`, 1600);
                    setTimeout(() => saveBtn.classList.remove('saved'), 2000);
                } catch (err) {
                    showToast('保存失败，请重试', 1800);
                    console.error(err);
                }
            }

            // ----- 事件绑定 -----
            importBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    handleFile(this.files[0]);
                }
                this.value = '';
            });

            saveBtn.addEventListener('click', saveImage);

            originalCard.addEventListener('click', function(e) {
                if (e.target.closest('button') || e.target.closest('a')) return;
                fileInput.click();
            });

            originalCard.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    fileInput.click();
                }
            });

            // ----- 拖拽上传 -----
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            function highlight() {
                originalCard.classList.add('drag-over');
            }

            function unhighlight() {
                originalCard.classList.remove('drag-over');
            }

            document.addEventListener('dragover', preventDefaults, false);
            document.addEventListener('drop', preventDefaults, false);

            gallery.addEventListener('dragenter', function(e) {
                preventDefaults(e);
                dragCounter++;
                if (dragCounter === 1) highlight();
            }, false);

            gallery.addEventListener('dragover', preventDefaults, false);

            gallery.addEventListener('dragleave', function(e) {
                preventDefaults(e);
                dragCounter--;
                if (dragCounter === 0) unhighlight();
            }, false);

            gallery.addEventListener('drop', function(e) {
                preventDefaults(e);
                dragCounter = 0;
                unhighlight();
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    const file = files[0];
                    if (file.type.startsWith('image/')) {
                        handleFile(file);
                    } else {
                        showToast('请拖拽图片文件', 1800);
                    }
                }
            }, false);

            document.body.addEventListener('dragover', preventDefaults, false);
            document.body.addEventListener('drop', preventDefaults, false);

            // ----- 键盘快捷键 -----
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                    e.preventDefault();
                    fileInput.click();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (!saveBtn.disabled) saveBtn.click();
                }
                if (e.key === 'Escape') {
                    if (settingsOverlay.classList.contains('open')) toggleSettings(false);
                }
            });

            // ----- 窗口大小变化时重新渲染预览 -----
            let resizeRenderTimer = null;
            window.addEventListener('resize', function() {
                clearTimeout(resizeRenderTimer);
                resizeRenderTimer = setTimeout(() => {
                    if (imageData) renderPreview();
                }, 200);
            });

            // ----- 初始化 -----
            saveBtn.disabled = true;
            fileNameInput.value = '黑白画';

            // 默认星空
            initStarCanvas();
            if (!document.hidden) startStarAnimation();
            bgLayer.style.background = '#0a0a0f';
            currentBg = 'star';
            document.querySelector('.bg-option[data-bg="star"] input[type="radio"]').checked = true;
            document.querySelector('.bg-option[data-bg="star"]').classList.add('active');
            document.querySelector('.bg-option[data-bg="star"]').setAttribute('aria-checked', 'true');

            // 初始化预览占位
            initDisplayCanvas();

            console.log('黑白画工具已加载 — 快捷键: Ctrl+O 导入 | Ctrl+S 保存 | Esc 关闭设置');
        })();
    </script>

</body>
</html>
